<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loader - Institución Educativa de Occidente</title>
  <script src="ie-occidente-loader.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 1.4rem;
      color: #1b8a43;
      margin-bottom: 10px;
    }

    p {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    button {
      background-color: #1b8a43;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background-color: #146b33;
    }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>I.E. de Occidente - Anserma Caldas</h1>
    <p>Haz clic en el botón inferior para simular una petición <code>fetch</code> a un servidor con el loader personalizado.</p>
    <button id="btn-fetch">Simular Carga de Datos</button>
  </div>

  <!-- COMPONENTE LOADER -->
  <ie-occidente-loader></ie-occidente-loader>

  <script>
    document.getElementById('btn-fetch').addEventListener('click', async () => {
      try {
        IELoader.show();
        await new Promise(resolve => setTimeout(resolve, 2000));
        alert('¡Petición finalizada con éxito!');
      } catch (e) {
        alert('Ocurrió un error en la simulación.');
      } finally {
        IELoader.hide();
      }
    });
  </script>
</body>
</html>
