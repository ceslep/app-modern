<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loader - Institución Educativa de Occidente</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f9;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 1.4rem;
      color: #1b8a43;
      margin-bottom: 10px;
    }

    p {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 25px;
      line-height: 1.5;
    }

    button {
      background-color: #1b8a43;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:hover {
      background-color: #146b33;
    }

    button:active {
      transform: scale(0.98);
    }

    /* ===================================================
       ESTILOS DEL LOADER DE LA I.E. DE OCCIDENTE
       =================================================== */
    .loader-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-in-out;
    }

    .loader-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Contenedor del tamaño exacto del aro: el escudo se centra
       respecto a ESTE cuadro (140x140), no respecto a todo el
       loader-container (que también incluye el texto de abajo). */
    .loader-ring-wrap {
      position: relative;
      width: 140px;
      height: 140px;
    }

    /* Anillo giratorio cuadriforme con los 4 colores institucionales */
    .loader-spinner {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 5px solid transparent;
      border-top-color: #2d72b8;    /* Azul */
      border-right-color: #ebd047;  /* Amarillo */
      border-bottom-color: #d62438; /* Rojo */
      border-left-color: #1b8a43;   /* Verde */
      animation: spin 1.2s linear infinite;
    }

    /* Escudo flotante centrado sobre el aro */
    .loader-logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulse 1.5s ease-in-out infinite alternate;
    }

    /* La imagen original (escudohd.png) viene en muy alta resolución.
       Sin este límite de tamaño, se ve gigante y tapa toda la pantalla. */
    .escudo-img {
      width: 90px;
      height: auto;
      display: block;
    }

    .loader-text {
      margin-top: 20px;
      font-weight: 700;
      font-size: 0.95rem;
      color: #1b8a43;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(0.92); opacity: 0.85; }
      100% { transform: translate(-50%, -50%) scale(1.05); opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>I.E. de Occidente - Anserma Caldas</h1>
    <p>Haz clic en el botón inferior para simular una petición <code>fetch</code> a un servidor con el loader personalizado.</p>
    <button id="btn-fetch">Simular Carga de Datos</button>
  </div>

  <!-- COMPONENTE LOADER -->
  <div id="loader-overlay" class="loader-overlay">
    <div class="loader-container">
      <div class="loader-ring-wrap">
        <div class="loader-spinner"></div>

        <!-- Imagen del escudo, tamaño controlado por .escudo-img -->
        <div class="loader-logo">
          <img src="escudohd.png" alt="Escudo I.E. Occidente" class="escudo-img">
        </div>
      </div>

      <p class="loader-text">Cargando...</p>
    </div>
  </div>

  <script>
    // CONTROL DEL LOADER
    const Loader = {
      overlay: document.getElementById('loader-overlay'),
      show() {
        this.overlay.classList.add('active');
      },
      hide() {
        this.overlay.classList.remove('active');
      }
    };

    // FUNCIÓN WRAPPER DE FETCH INTERCEPTADO
    // Úsala en tu proyecto real así:
    //   const datos = await fetchWithLoader('https://api.ejemplo.com/datos');
    async function fetchWithLoader(url, options = {}) {
      try {
        Loader.show();
        const response = await fetch(url, options);
        if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
        return await response.json();
      } catch (error) {
        console.error("Error en petición:", error);
        throw error;
      } finally {
        Loader.hide();
      }
    }

    // DEMOSTRACIÓN DE USO (con el botón de la tarjeta)
    document.getElementById('btn-fetch').addEventListener('click', async () => {
      try {
        Loader.show();                                   // muestra el loader
        // Simulación de delay de red (reemplaza esto por tu fetch real,
        // o usa directamente fetchWithLoader('tu-url') más arriba)
        await new Promise(resolve => setTimeout(resolve, 2000));
        alert('¡Petición finalizada con éxito!');
      } catch (e) {
        alert('Ocurrió un error en la simulación.');
      } finally {
        Loader.hide();                                    // lo oculta siempre, haya éxito o error
      }
    });
  </script>
</body>
</html>
